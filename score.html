<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    p{
      font-size: 4rem;
      text-align: center;
      color: rgba(78, 11, 140, 0.751);
    }
    .buttons{
      display: flex;
      justify-content: space-evenly;
    }
    button{
      padding: 1rem 2rem;
      background-color: rgba(62, 117, 17, 0.625);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

  </style>
</head>
<body>
  <p id="score">0</p>
  <div class="buttons">
    <button type="button" id="btn-1">increment</button>
    <button type="button" id="btn-2">decrement</button>
    <button type="button" id="btn-3">reset</button>
  </div>
  <script>
    const savedData = Number(localStorage.getItem("score")) || 0;
    // closure counter
    const counter = (initialValue = 0) => {
      let score = initialValue;
      return {
        increment: ()=> {
          score++;
          return score;
        },
        decrement: ()=> {
          if(score > 0) score--;
          return score;
        },
        reset: ()=>{
          score = 0;
          return score;
        }
      };
    };
    const myCounter = counter(savedData);

    // create counter with saved value
    const scoreDisplay = document.getElementById("score");
    const btn1 = document.getElementById("btn-1");
    const btn2 = document.getElementById("btn-2");
    const btn3 = document.getElementById("btn-3"); 

    scoreDisplay.innerHTML = savedData;

    btn1.addEventListener("click", () => {
      const value = myCounter.increment();
      scoreDisplay.innerHTML = value;
      localStorage.setItem("score", value);
    });
    btn2.addEventListener("click", () => {
      const value = myCounter.decrement();
      scoreDisplay.innerHTML = value;
      localStorage.setItem("score", value);
    });
    btn3.addEventListener("click", () => {
      const value = myCounter.reset();
      scoreDisplay.innerHTML = value;
      localStorage.setItem("score", value);
    });

  </script>
</body>
</html>
